<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bybit Scanner - Viagra Pro</title>
    <style>
        :root { --bg: #0c0d10; --panel: #1e222d; --accent: #2962ff; --text: #d1d4dc; --success: #00ff88; }
        html, body { background: var(--bg); color: var(--text); margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Trebuchet MS', sans-serif; touch-action: manipulation; }
        #app-container { width: 100%; height: 100%; display: flex; flex-direction: column; background: var(--bg); }
        #toolbar { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; background: var(--panel); border-bottom: 1px solid #363a45; flex-shrink: 0; }
        .controls-left { display: flex; gap: 8px; align-items: center; }
        .pagination { display: flex; gap: 12px; align-items: center; background: #2a2e39; padding: 5px 12px; border-radius: 20px; }
        select, button { background: #2a2e39; color: white; border: 1px solid #434651; padding: 8px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-fs { background: var(--accent); border: none; }
        .nav-btn { font-size: 18px; background: none; border: none; color: var(--accent); padding: 0 5px; }
        .nav-btn:disabled { color: #5d606b; }
        #chartGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; }
        @media (max-width: 1024px) { #chartGrid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { #chartGrid { grid-template-columns: 1fr; } }
        .chart-card { background: var(--panel); border-radius: 8px; overflow: hidden; min-height: 450px; border: 1px solid #363a45; display: flex; flex-direction: column; transition: all 0.3s ease; }
        .chart-card.is-multiframe { grid-column: 1 / -1; height: 800px; }
        .chart-header { padding: 8px 12px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; background: #2a2e39; }
        .chart-header a { color: var(--success); text-decoration: none; font-weight: bold; font-size: 14px; }
        .btn-multi { background: #363a45; font-size: 10px; padding: 4px 8px; border: 1px solid #434651; border-radius: 3px; }
        .btn-multi.active { background: var(--accent); }
        .frames-container { flex-grow: 1; display: grid; width: 100%; height: 100%; }
        .single-view { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .multi-view { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        iframe { width: 100%; height: 100%; border: none; }
        .loader { text-align: center; padding: 40px; grid-column: 1 / -1; }
    </style>
</head>
<body>
<div id="app-container">
    <div id="toolbar">
        <div class="controls-left">
            <button class="btn-fs" onclick="toggleAppFullScreen()">⛶ App</button>
            <select id="tf-select" onchange="syncChartsTimeframe(this.value)">
                <option value="1">1m</option><option value="5">5m</option>
                <option value="15">15m</option><option value="30" selected>30m</option>
                <option value="60">1h</option><option value="240">4h</option><option value="D">1D</option>
            </select>
            <button onclick="startScanner()">🚀 Scan & Sort</button>
        </div>
        <div class="pagination">
            <button class="nav-btn" id="prevPage" onclick="prevPage()">◀</button>
            <span id="pageInfo" style="font-size: 12px;">- / -</span>
            <button class="nav-btn" id="nextPage" onclick="nextPage()">▶</button>
        </div>
        <div id="status" style="font-size: 10px; color: #848e9c;">Pronto</div>
    </div>
    <div id="chartGrid"></div>
</div>

<script>
    let allValidData = [];
    let currentPage = 0;
    const chartsPerPage = 6;
    const scriptID = "OdcwWfHJ"; // Il tuo ID Script privato
    let viewTF = localStorage.getItem('viagra-view-tf') || '30';
    document.getElementById('tf-select').value = viewTF;

    function toggleAppFullScreen() {
        const app = document.documentElement;
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (app.requestFullscreen) app.requestFullscreen();
            else if (app.webkitRequestFullscreen) app.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    async function startScanner() {
        const grid = document.getElementById('chartGrid');
        grid.innerHTML = '<div class="loader">Analisi 1m in corso...</div>';
        try {
            const resp = await fetch('https://api.bybit.com/v5/market/tickers?category=linear');
            const data = await resp.json();
            const pairs = data.result.list.filter(i => i.symbol.endsWith('USDT'));
            allValidData = [];
            const promises = pairs.map(async (p) => {
                const rangeVal = await getRange1m(p.symbol);
                if (rangeVal >= 0.5) allValidData.push({ symbol: p.symbol, range: rangeVal });
            });
            await Promise.all(promises);
            allValidData.sort((a, b) => b.range - a.range);
            currentPage = 0;
            renderPage();
        } catch (e) { grid.innerHTML = '<div class="loader">Errore API.</div>'; }
    }

    async function getRange1m(symbol) {
        try {
            const resp = await fetch(`https://api.bybit.com/v5/market/kline?category=linear&symbol=${symbol}&interval=1&limit=3`);
            const data = await resp.json();
            const k = data.result.list;
            let hi = Math.max(parseFloat(k[0][2]), parseFloat(k[1][2]), parseFloat(k[2][2]));
            let lo = Math.min(parseFloat(k[0][3]), parseFloat(k[1][3]), parseFloat(k[2][3]));
            return ((hi - lo) / lo) * 100;
        } catch (e) { return 0; }
    }

    // Funzione helper per generare l'URL con lo Script ID
    function getTvUrl(symbol, tf) {
        return `https://s.tradingview.com/widgetembed/?symbol=BYBIT:${symbol}.P&interval=${tf}&theme=dark&style=1&layout=Default&studies=${scriptID}`;
    }

    function renderPage() {
        const grid = document.getElementById('chartGrid');
        grid.innerHTML = "";
        const start = currentPage * chartsPerPage;
        const pageItems = allValidData.slice(start, start + chartsPerPage);
        const totalPages = Math.ceil(allValidData.length / chartsPerPage);
        document.getElementById('pageInfo').innerText = `${currentPage + 1} / ${totalPages || 1}`;
        document.getElementById('prevPage').disabled = currentPage === 0;
        document.getElementById('nextPage').disabled = start + chartsPerPage >= allValidData.length;

        pageItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'chart-card';
            card.id = `card-${item.symbol}`;
            card.innerHTML = `
                <div class="chart-header">
                    <a href="https://www.bybit.com/trade/usdt/${item.symbol}" target="_blank">🔗 ${item.symbol}</a>
                    <button class="btn-multi" onclick="toggleMultiframe('${item.symbol}')">MULTIFRAME</button>
                    <span class="range-badge">1m: ${item.range.toFixed(2)}%</span>
                </div>
                <div class="frames-container single-view" id="container-${item.symbol}">
                    <iframe src="${getTvUrl(item.symbol, viewTF)}" allowfullscreen></iframe>
                </div>
            `;
            grid.appendChild(card);
        });
        document.getElementById('status').innerText = `Tot: ${allValidData.length}`;
    }

    function toggleMultiframe(symbol) {
        const card = document.getElementById(`card-${symbol}`);
        const container = document.getElementById(`container-${symbol}`);
        const btn = card.querySelector('.btn-multi');
        const isMulti = card.classList.toggle('is-multiframe');
        btn.classList.toggle('active');
        if (isMulti) {
            container.classList.replace('single-view', 'multi-view');
            container.innerHTML = `
                <iframe src="${getTvUrl(symbol, '1')}"></iframe>
                <iframe src="${getTvUrl(symbol, '5')}"></iframe>
                <iframe src="${getTvUrl(symbol, '30')}"></iframe>
                <iframe src="${getTvUrl(symbol, 'D')}"></iframe>
            `;
        } else {
            container.classList.replace('multi-view', 'single-view');
            container.innerHTML = `<iframe src="${getTvUrl(symbol, viewTF)}"></iframe>`;
        }
    }

    function nextPage() { currentPage++; renderPage(); document.getElementById('chartGrid').scrollTop = 0; }
    function prevPage() { currentPage--; renderPage(); document.getElementById('chartGrid').scrollTop = 0; }
    function syncChartsTimeframe(tf) { viewTF = tf; localStorage.setItem('viagra-view-tf', tf); renderPage(); }
    window.onload = startScanner;
</script>
</body>
</html>
